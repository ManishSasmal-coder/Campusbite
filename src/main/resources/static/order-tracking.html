<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - CanteenAdda</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .sidebar {
            width: 250px;
            flex-shrink: 0;
            position: sticky;
            top: 100px;
        }

        .main-content {
            flex-grow: 1;
        }

        .sidebar a {
            display: block;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: var(--secondary-color);
            text-decoration: none;
            color: var(--text-color);
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }

        .sidebar a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateX(5px);
        }

        .tracker {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0;
            padding: 1.5rem;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            position: relative;
        }

        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #e2e8f0;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: bold;
            transition: var(--transition);
        }

        .step.active .circle {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
        }

        .step p {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
        }

        .step.active p {
            color: var(--text-color);
        }

        .order-card {
            border-left: 5px solid var(--primary-color);
            margin-bottom: 2rem;
            background: white;
        }
    </style>
</head>

<body>
    <nav>
        <a href="student-dashboard.html" class="logo">CanteenAdda</a>
        <div>
            <button onclick="logout()" class="btn-primary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <a href="student-dashboard.html">Dashboard</a>
            <a href="menu.html">Browse Menu</a>
            <a href="cart.html">View Cart (<span id="cartCount">0</span>)</a>
            <a href="order-tracking.html" style="background: var(--primary-color); color: white;">Track Order</a>
            <a href="order-history.html">Order History</a>
        </div>
        <div class="main-content">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">Track Your Orders</h1>
            <div id="trackingContainer">
                <!-- Active orders injected here -->
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>

</html>
