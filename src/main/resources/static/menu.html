<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - CanteenAdda</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <a href="student-dashboard.html" class="logo">CanteenAdda</a>
        <div>
            <a href="menu.html">Menu</a>
            <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
            <button onclick="logout()" class="btn-primary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <!-- Centered Search Bar -->
        <div style="display: flex; justify-content: center; margin-bottom: 2.5rem; width: 100%;">
            <input type="text" id="menuSearch" placeholder="🔍 Search menu items..."
                style="width: 100%; max-width: 600px; padding: 1rem 1.5rem; border-radius: 50px; font-size: 1.1rem; box-shadow: 0 6px 20px rgba(0,0,0,0.08);">
        </div>
        <h1 style="color: var(--primary-color); margin-bottom: 2rem; text-align: center;">Canteen Menu</h1>
        <div class="grid" id="menuGrid">
            <!-- Menu Items will be injected here -->
        </div>
    </div>
    <!-- Review Display Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 id="reviewModalTitle" style="color: var(--primary-color);">Reviews</h2>
                <button onclick="closeReviewModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">✖</button>
            </div>
            
            <div id="reviewsList" style="max-height: 400px; overflow-y: auto; padding-right: 10px;">
                <!-- Reviews injected here -->
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
</body>

</html>
