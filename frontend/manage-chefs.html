<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Chefs - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sidebar { float: left; width: 22%; padding-right: 2rem; }
        .main-content { float: left; width: 78%; }
        .sidebar a { display: block; padding: 1rem; margin-bottom: 0.5rem; background: var(--secondary-color); text-decoration: none; color: var(--text-color); border-radius: var(--border-radius); box-shadow: var(--shadow); }
        .sidebar a:hover { background: var(--primary-color); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <nav>
        <a href="admin-dashboard.html" class="logo">CampusBite Admin</a>
        <div>
            <button onclick="logout()" class="btn-primary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="manage-chefs.html" style="background: var(--primary-color); color: white;">Manage Chefs</a>
            <a href="manage-menu.html">Manage Menu</a>
            <a href="view-orders.html">View All Orders</a>
        </div>
        <div class="main-content">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">Manage Chefs</h1>
            
            <div class="card">
                <h3>Add New Chef</h3><br>
                <form id="addChefForm">
                    <input type="text" id="chefUsername" placeholder="Username" required>
                    <input type="text" id="chefFullName" placeholder="Full Name" required>
                    <input type="password" id="chefPassword" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Add Chef</button>
                </form>
            </div>

            <div class="card">
                <h3>Current Chefs</h3>
                <div id="chefsList"></div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
