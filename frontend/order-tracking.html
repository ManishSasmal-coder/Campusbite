<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - CanteenAdda</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tracker {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: var(--border-radius);
            position: relative;
        }

        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .step.active .circle {
            background: var(--primary-color);
        }

        .step p {
            font-size: 0.9rem;
            font-weight: bold;
        }

        .order-card {
            border-left: 5px solid var(--primary-color);
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <nav>
        <a href="student-dashboard.html" class="logo">CanteenAdda</a>
        <div>
            <a href="menu.html">Menu</a>
            <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
            <a href="order-tracking.html">Track Order</a>
            <a href="order-history.html">History</a>
            <button onclick="logout()" class="btn-primary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <h1 style="color: var(--primary-color); margin-bottom: 2rem;">Track Your Orders</h1>
        <div id="trackingContainer">
            <!-- Active orders injected here -->
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>

</html>
