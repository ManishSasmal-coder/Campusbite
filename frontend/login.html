<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusBite</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">CampusBite</a>
    </nav>
    <div class="container" style="max-width: 400px; margin-top: 5rem;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <select id="role">
                    <option value="STUDENT">Student</option>
                    <option value="CHEF">Chef</option>
                    <option value="ADMIN">Admin</option>
                </select>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary-color);">Sign Up</a>
            </p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
