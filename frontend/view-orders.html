<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View All Orders - CanteenAdda</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 100px;
        }

        .main-content {
            flex-grow: 1;
        }

        .sidebar a {
            display: block;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: var(--secondary-color);
            text-decoration: none;
            color: var(--text-color);
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }

        .sidebar a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateX(5px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>
    <nav>
        <a href="admin-dashboard.html" class="logo">CanteenAdda Admin</a>
        <div>
            <button onclick="logout()" class="btn-primary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="manage-chefs.html">Manage Chefs</a>
            <a href="manage-menu.html">Manage Menu</a>
            <a href="view-orders.html" style="background: var(--primary-color); color: white;">View All Orders</a>
            <a href="admin-analytics.html">Analytics Report</a>
        </div>
        <div class="main-content">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">All System Orders</h1>
            <div class="card" style="overflow-x: auto;">
                <div id="allOrdersList"></div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
