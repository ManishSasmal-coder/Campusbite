<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - CanteenAdda</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <style>
        .container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .sidebar {
            width: 250px;
            flex-shrink: 0;
            position: sticky;
            top: 100px;
        }

        .main-content {
            flex-grow: 1;
        }

        .sidebar a {
            display: block;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: var(--secondary-color);
            text-decoration: none;
            color: var(--text-color);
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }

        .sidebar a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateX(5px);
        }

        .status-text-collected { color: #10b981; }
        .status-text-cancelled { color: #ef4444; }
    </style>
</head>

<body>
    <nav>
        <a href="student-dashboard.html" class="logo">CanteenAdda</a>
        <div>
            <button onclick="logout()" class="btn-primary">Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <a href="student-dashboard.html">Dashboard</a>
            <a href="menu.html">Browse Menu</a>
            <a href="cart.html">View Cart (<span id="cartCount">0</span>)</a>
            <a href="order-tracking.html">Track Order</a>
            <a href="order-history.html" style="background: var(--primary-color); color: white;">Order History</a>
        </div>
        <div class="main-content">
            <h1 style="color: var(--primary-color); margin-bottom: 2rem;">Order History</h1>
            <div id="historyContainer">
                <!-- Past orders injected here -->
            </div>
        </div>
    </div>
    <!-- Feedback Modal -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-color); text-align: center;">How was your meal?</h2>
            <p style="text-align: center; color: var(--text-muted);">Your feedback helps us improve!</p>
            
            <form id="feedbackForm">
                <input type="hidden" id="modalMenuItemId">
                <input type="hidden" id="modalOrderId">
                
                <div class="star-input">
                    <input type="radio" name="rating" value="5" id="s5"><label for="s5">★</label>
                    <input type="radio" name="rating" value="4" id="s4"><label for="s4">★</label>
                    <input type="radio" name="rating" value="3" id="s3"><label for="s3">★</label>
                    <input type="radio" name="rating" value="2" id="s2"><label for="s2">★</label>
                    <input type="radio" name="rating" value="1" id="s1" required><label for="s1">★</label>
                </div>
                
                <textarea class="feedback-textarea" id="feedbackComment" placeholder="Write a quick comment (optional)..." maxlength="500"></textarea>
                
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn-primary" style="background: #94a3b8; flex: 1;" onclick="closeFeedbackModal()">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 2;">Submit Review</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>

</html>
